<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{ site.Params.shortTitle }} | {{ .Title }}</title>
    <meta charset="utf-8">
    <script>
        if (localStorage.getItem("altMode") === "on") {
            document.documentElement.classList.add("alt-mode");
        }
    </script>
    <link rel="shortcut icon" href="{{ "favicon.ico" | relURL }}" type="image/icon">
    <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/icon">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">

    <!-- Social sharing previews -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site.Params.shortTitle }} | {{ .Title }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:image" content="{{ "assets/img/Noah_Paladino_Headshot_Square.jpg" | absURL }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ site.Params.shortTitle }} | {{ .Title }}">
    <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
    <meta name="twitter:image" content="{{ "assets/img/Noah_Paladino_Headshot_Square.jpg" | absURL }}">

    {{ if eq .Section "blog" }}
    <link rel="alternate" type="application/rss+xml" title="{{ site.Params.shortTitle }} — Blog" href="{{ "/blog/feed.xml" | absURL }}">
    {{ end }}

    <!-- Type: Playfair Display (display) + Source Serif 4 (body) + IBM Plex Mono (metadata/labels)
         Fredoka + Baloo 2 power an alternate theme (see .alt-mode in style.css) -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..600;1,8..60,300..600&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Fredoka:wght@400..700&family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ "assets/css/style.css" | relURL }}">

    {{ if .Params.math }}
    <script>
      window.MathJax = {
        tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["\\[", "\\]"]] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {{ end }}

    <meta name="google-site-verification" content="JY83yB4L21zRVvDarmmI5D7XRR4Pzl5SDU_LKLa7nV4" />

    <link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}">

    {{ if hugo.IsProduction }}{{ template "_internal/google_analytics.html" . }}{{ end }}
</head>
