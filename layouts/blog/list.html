{{ partial "head.html" . }}

<body>
  <header class="site-header">
    <div class="wrap site-header-inner">
      <a class="wordmark" href="{{ "/" | relURL }}">Noah Paladino</a>
      <nav class="hero-nav" aria-label="Page sections">
        <a href="{{ "/#research" | relURL }}">Research</a>
        <a href="{{ "/#projects" | relURL }}">Projects</a>
        <a href="{{ "/blog/" | relURL }}">Blog</a>
      </nav>
    </div>
  </header>

  <section class="section section--paper">
    <div class="wrap">
      <span class="section-kicker">&sect; Blog</span>
      <h2 class="section-title">{{ .Title }}</h2>
      {{ with .Params.blurb }}<p class="section-blurb">{{ . }}</p>{{ end }}

      <div class="entries">
        {{ range .Pages.ByDate.Reverse }}
        <article class="entry">
          <div class="entry-meta">
            <span class="entry-time">{{ .Date.Format "Jan 2, 2006" }}</span>
          </div>
          <div class="entry-body">
            <h3 class="entry-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
            <p class="entry-desc">{{ .Description }}</p>
          </div>
        </article>
        {{ end }}
      </div>
    </div>
  </section>

  {{ partial "footer.html" . }}

  <script>
    (function () {
      var entries = document.querySelectorAll(".entry");
      var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion || !("IntersectionObserver" in window)) {
        entries.forEach(function (el) { el.classList.add("is-visible"); });
        return;
      }
      var observer = new IntersectionObserver(function (observed) {
        observed.forEach(function (item) {
          if (item.isIntersecting) {
            item.target.classList.add("is-visible");
            observer.unobserve(item.target);
          }
        });
      }, { threshold: 0.15 });
      entries.forEach(function (el) { observer.observe(el); });
    })();
  </script>
</body>

</html>
